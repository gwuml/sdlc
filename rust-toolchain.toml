# Pinned Rust toolchain for reproducible builds (FAC 18).
# A specific version string is required — NOT `channel = "stable"` — so that two
# independent CI runs on the same commit install the same compiler and produce
# byte-identical binaries. CI verifies the active `rustc --version` matches this
# pin before building and fails otherwise.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]
