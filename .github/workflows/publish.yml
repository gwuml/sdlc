# Publish to PyPI on a v* tag, using PyPI Trusted Publishing (OIDC) — no stored token.
#
# One-time operator setup (cannot be automated here): on PyPI, add this repo + this
# workflow as a Trusted Publisher for the `sdlc-control-plane` project
# (https://docs.pypi.org/trusted-publishers/). Until then this workflow no-ops safely
# because the OIDC exchange will simply not be authorized.
name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$tag pkg=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match pyproject version $ver"; exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
