# CI test gate — runs on every PR and push to main. This is the merge gate that was
# missing (only release.yml existed): broken commits should fail here before merge.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Unit + parity tests
        run: python -m unittest discover -s tests -v
      - name: Self-validate repo structure
        run: python -m sdlc validate

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: |
          ver="$(grep -E '^channel' rust-toolchain.toml | sed -E 's/.*"(.*)".*/\1/')"
          rustup toolchain install "$ver"
          rustup component add rustfmt clippy
      - name: Build + test
        run: cargo test
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (no warnings)
        run: cargo clippy -- -D warnings

  secrets-scan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: detect-secrets scan (fail only on NEW secrets vs .secrets.baseline)
        run: |
          # Pin to the version the committed .secrets.baseline was generated with, so a
          # future detect-secrets release can't introduce spurious "new" findings.
          python -m pip install --upgrade pip "detect-secrets==1.5.0"
          # Scan git-tracked files (not --all-files: that picks up local venvs/caches).
          # Known false positives (regex patterns in util.py, a commit hash, test HMAC
          # data) are allowlisted in the committed .secrets.baseline. The redaction test
          # corpus and run fixtures intentionally hold fake secret-shaped strings.
          detect-secrets scan \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files 'tests/test_redaction\.py' \
            --exclude-files 'tests/fixtures/.*' > /tmp/fresh.json
          python - <<'PY'
          import json, sys
          def findings(path):
              r = json.load(open(path)).get("results", {})
              return {(f, e.get("hashed_secret")) for f, items in r.items() for e in items}
          baseline = findings(".secrets.baseline")
          fresh = findings("/tmp/fresh.json")
          new = fresh - baseline
          if new:
              print("::error::NEW secrets not in .secrets.baseline:", sorted(f for f, _ in new))
              sys.exit(1)
          print(f"detect-secrets: clean ({len(baseline)} allowlisted, 0 new)")
          PY
